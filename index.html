<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Seguridad Informática</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff9d;
    --accent2: #ff3c6e;
    --accent3: #4d9fff;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --correct: #00ff9d;
    --wrong: #ff3c6e;
    --card: #13131c;
    --multi: #c77dff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(0,255,157,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -15%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(255,60,110,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: block;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: 'Space Mono', monospace;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 4px;
    margin-bottom: 2.5rem;
    overflow: hidden;
    animation: fadeIn 0.5s ease both 0.3s;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 0.5rem;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: slideUp 0.4s ease both;
    transition: border-color 0.3s;
  }
  .question-card:hover { border-color: #2a2a3a; }

  .q-header {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    margin-bottom: 1.25rem;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.2);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    white-space: nowrap;
    margin-top: 0.15rem;
    flex-shrink: 0;
  }

  .q-num.multi-badge {
    color: var(--multi);
    background: rgba(199,125,255,0.08);
    border-color: rgba(199,125,255,0.25);
  }

  .q-topic {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  .multi-hint {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--multi);
    background: rgba(199,125,255,0.08);
    border: 1px solid rgba(199,125,255,0.2);
    border-radius: 5px;
    padding: 0.15rem 0.5rem;
    margin-top: 0.5rem;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 0.75rem;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
    width: 100%;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }

  /* Single select hover */
  .option-btn.single:hover:not(:disabled) {
    border-color: var(--accent3);
    color: #fff;
    transform: translateX(3px);
  }
  .option-btn.single:hover:not(:disabled)::before { opacity: 0.04; }

  /* Multi select */
  .option-btn.multi:hover:not(:disabled) {
    border-color: var(--multi);
    color: #fff;
    transform: translateX(3px);
  }
  .option-btn.multi.selected:not(:disabled) {
    border-color: var(--multi);
    background: rgba(199,125,255,0.1);
    color: var(--multi);
  }
  .option-btn.multi.selected .option-letter {
    background: var(--multi);
    color: var(--bg);
  }

  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    background: var(--border);
    border-radius: 5px;
    padding: 0.15rem 0.4rem;
    flex-shrink: 0;
    transition: all 0.18s;
    position: relative;
    z-index: 1;
  }

  /* Multi: checkbox visual */
  .option-btn.multi .option-letter {
    border-radius: 4px;
    width: 22px;
    text-align: center;
  }

  .option-text { position: relative; z-index: 1; }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(0,255,157,0.07);
    color: var(--correct);
  }
  .option-btn.correct .option-letter {
    background: var(--correct);
    color: var(--bg);
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,60,110,0.07);
    color: var(--wrong);
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong);
    color: #fff;
  }

  .option-btn.partial-correct {
    border-color: #f4a261;
    background: rgba(244,162,97,0.07);
    color: #f4a261;
  }
  .option-btn.partial-correct .option-letter {
    background: #f4a261;
    color: var(--bg);
  }

  .option-btn:disabled { cursor: default; }

  /* Submit button for multi */
  .multi-submit {
    margin-top: 0.75rem;
    background: rgba(199,125,255,0.12);
    border: 1px solid rgba(199,125,255,0.35);
    border-radius: 8px;
    color: var(--multi);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.65rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .multi-submit:hover:not(:disabled) {
    background: rgba(199,125,255,0.22);
    transform: translateY(-1px);
  }
  .multi-submit:disabled { opacity: 0.4; cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 1rem;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(0,255,157,0.07); border: 1px solid rgba(0,255,157,0.2); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(255,60,110,0.07); border: 1px solid rgba(255,60,110,0.2); color: #ff7a9a; }
  .feedback.partial-fb { background: rgba(244,162,97,0.07); border: 1px solid rgba(244,162,97,0.2); color: #f4a261; }

  /* Score panel */
  .score-panel {
    display: none;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2rem;
    animation: slideUp 0.5s ease both;
  }
  .score-panel.show { display: block; }

  .score-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2.2rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    position: relative;
  }
  .score-ring::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct), var(--border) 0);
    z-index: -1;
  }

  .score-label { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; font-family: 'Space Mono', monospace; }
  .score-verdict { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
  .score-detail { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-bottom: 2rem; }

  .btn-restart {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.85rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,157,0.25); }

  .breakdown {
    margin-top: 2rem;
    text-align: left;
  }
  .breakdown-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }
  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    gap: 1rem;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .bi-topic { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.72rem; flex-shrink: 0; }
  .bi-q { flex: 1; }
  .bi-result { font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; }
  .bi-result.ok { color: var(--correct); }
  .bi-result.fail { color: var(--wrong); }
  .bi-result.partial { color: #f4a261; }

  @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="tag">// Cuestionario de repaso</span>
    <h1>Seguridad<br><span>Informática</span></h1>
    <p class="subtitle">Opción única · <span style="color:var(--multi)">Selección múltiple</span> · Justificación por respuesta</p>
  </header>

  <div id="quiz-area">
    <div class="progress-label" id="progress-label">Pregunta 1 de —</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div id="questions-container"></div>
  </div>

  <div class="score-panel" id="score-panel">
    <p class="score-label">Resultado final</p>
    <div class="score-ring" id="score-ring" style="--pct:0deg">—</div>
    <div class="score-verdict" id="score-verdict"></div>
    <div class="score-detail" id="score-detail"></div>
    <button class="btn-restart" onclick="restart()">↺ Reiniciar Quiz</button>
    <div class="breakdown" id="breakdown">
      <div class="breakdown-title">Detalle por pregunta</div>
      <div id="breakdown-list"></div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────
//  PREGUNTAS
//  type: "single" | "multi"
//  Para multi: correct es true/false por opción
//              correctCount = cuántas hay que marcar
// ─────────────────────────────────────────────────────────
const ALL_QUESTIONS = [

  // ════════════════════ ACTIVOS ════════════════════
  {
    type: "single",
    topic: "Activos",
    question: "¿Cuál de las siguientes opciones define correctamente un 'activo de información'?",
    options: [
      { text: "Cualquier herramienta de software que automatiza procesos internos", correct: false, feedback: "El software puede ser un activo, pero la definición no se limita a herramientas de automatización." },
      { text: "Cualquier información o dato que posee valor para una organización o individuo", correct: true, feedback: "Correcto. Un activo de información es 'algo' que genera valor; el activo principal de la seguridad informática es la información." },
      { text: "La infraestructura de red que soporta la transmisión de datos en la organización", correct: false, feedback: "La infraestructura de red puede ser un activo, pero la definición de activo de información es más amplia." },
      { text: "El conjunto de políticas y normas que regulan el uso de la tecnología", correct: false, feedback: "Las políticas son parte del SGSI, no la definición de activo de información." }
    ]
  },

  // ════════════════════ CIA ════════════════════
  {
    type: "single",
    topic: "Pilares CIA",
    question: "La 'Disponibilidad' como pilar de seguridad se enfoca en garantizar que:",
    options: [
      { text: "Solo usuarios autorizados puedan leer la información (Read)", correct: false, feedback: "Eso describe la Confidencialidad, no la Disponibilidad." },
      { text: "La información no pueda ser modificada sin autorización (Write)", correct: false, feedback: "Eso describe la Integridad, no la Disponibilidad." },
      { text: "Los sistemas e información sean accesibles para usuarios autorizados cuando sea necesario (Access)", correct: true, feedback: "Correcto. La Disponibilidad asegura el acceso oportuno a la información y los sistemas." },
      { text: "Los datos en tránsito viajen cifrados entre origen y destino", correct: false, feedback: "El cifrado en tránsito apoya la Confidencialidad; no define a la Disponibilidad." }
    ]
  },
  {
    type: "single",
    topic: "Pilares CIA",
    question: "Un atacante modifica registros contables en una base de datos sin ser detectado. ¿Qué pilar del modelo CIA fue vulnerado principalmente?",
    options: [
      { text: "Confidencialidad, porque accedió sin autorización a datos reservados", correct: false, feedback: "La confidencialidad se viola al leer datos sin permiso; aquí el daño fue la modificación." },
      { text: "Disponibilidad, porque los usuarios no pueden confiar en el sistema", correct: false, feedback: "La disponibilidad refiere al acceso oportuno, no a la veracidad del contenido." },
      { text: "Integridad, porque alteró información sin autorización", correct: true, feedback: "Correcto. La integridad impide la modificación no autorizada (Write); modificar registros la viola directamente." },
      { text: "Todos los pilares por igual, ya que cualquier ataque los compromete simultáneamente", correct: false, feedback: "Los pilares pueden afectarse juntos, pero aquí el principal afectado es la Integridad." }
    ]
  },
  {
    type: "multi",
    topic: "Pilares CIA",
    question: "Un ransomware cifra todos los archivos de un servidor y los deja inaccesibles. ¿Qué pilares del modelo CIA se ven afectados directamente? (Seleccioná todos los que apliquen)",
    options: [
      { text: "Confidencialidad — el cifrado impide que los dueños accedan a su propia información legible", correct: false, feedback: "La confidencialidad protege contra terceros no autorizados; aquí el problema es que los dueños tampoco pueden acceder." },
      { text: "Disponibilidad — los archivos ya no son accesibles para los usuarios autorizados", correct: true, feedback: "Correcto. El ransomware bloquea el acceso a la información, violando directamente la Disponibilidad." },
      { text: "Integridad — los archivos fueron modificados (cifrados) sin autorización", correct: true, feedback: "Correcto. Al cifrar los archivos sin autorización, se alteró su contenido, afectando la Integridad." },
      { text: "No repudio — el atacante puede negar haber cifrado los datos", correct: false, feedback: "El no repudio no es uno de los tres pilares CIA del material; el daño aquí es en Disponibilidad e Integridad." }
    ]
  },

  // ════════════════════ AMENAZA / VULNERABILIDAD / RIESGO ════════════════════
  {
    type: "single",
    topic: "Amenaza / Vulnerabilidad / Riesgo",
    question: "La 'necesidad de energía eléctrica' de un servidor es un ejemplo de:",
    options: [
      { text: "Amenaza, porque puede causar daño al sistema si falla", correct: false, feedback: "La amenaza es el evento externo (el corte de luz); la necesidad de energía es una condición del propio sistema." },
      { text: "Riesgo, porque representa la probabilidad de que el servidor se apague", correct: false, feedback: "El riesgo es la probabilidad de que la amenaza explote la debilidad; no es la debilidad en sí." },
      { text: "Vulnerabilidad, porque es una debilidad que podría ser explotada por una amenaza", correct: true, feedback: "Correcto. La dependencia de electricidad es una debilidad del sistema que un corte de luz puede explotar." },
      { text: "Contramedida, porque se gestiona mediante un UPS", correct: false, feedback: "El UPS es la contramedida; la dependencia de electricidad es la vulnerabilidad que justifica esa contramedida." }
    ]
  },
  {
    type: "single",
    topic: "Amenaza / Vulnerabilidad / Riesgo",
    question: "Al evaluar el riesgo de un par activo-amenaza, ¿qué dos factores se combinan para calcularlo?",
    options: [
      { text: "El valor del activo y el costo de la contramedida", correct: false, feedback: "Esos factores sirven para decidir si implementar una contramedida, no para calcular el riesgo." },
      { text: "La probabilidad de que la amenaza se materialice y el impacto sobre el negocio", correct: true, feedback: "Correcto. El riesgo = probabilidad de ocurrencia × impacto potencial sobre el negocio." },
      { text: "La cantidad de vulnerabilidades del activo y el número de amenazas conocidas", correct: false, feedback: "Son insumos del análisis, pero el riesgo se calcula con probabilidad e impacto, no con conteos." },
      { text: "El tipo de amenaza (interna o externa) y el área organizacional afectada", correct: false, feedback: "Esos son atributos clasificatorios, no los factores que determinan el nivel de riesgo." }
    ]
  },

  // ════════════════════ CONTRAMEDIDAS ════════════════════
  {
    type: "single",
    topic: "Contramedidas",
    question: "La evaluación 'riesgo-recompensa' al decidir implementar una contramedida considera principalmente:",
    options: [
      { text: "Si la contramedida elimina completamente el riesgo residual asociado", correct: false, feedback: "Ninguna contramedida elimina el riesgo a cero; ese no puede ser el criterio." },
      { text: "Si el costo y la complejidad de la contramedida justifican la reducción del riesgo que ofrece", correct: true, feedback: "Correcto. Se pondera si la inversión (presupuesto, complejidad) es razonable frente al riesgo que mitiga." },
      { text: "Si la contramedida cumple con los requisitos de la norma ISO 27001", correct: false, feedback: "El cumplimiento normativo es un beneficio, pero no el criterio central de la evaluación riesgo-recompensa." },
      { text: "Si la amenaza asociada es de origen externo o interno a la organización", correct: false, feedback: "El origen de la amenaza no es el factor decisivo; lo son el costo de la contramedida y la magnitud del riesgo." }
    ]
  },

  // ════════════════════ SEGURIDAD FÍSICA / LÓGICA / PERSONAS ════════════════════
  {
    type: "single",
    topic: "Áreas de Seguridad",
    question: "La detección de intrusiones (IDS) y el cifrado de datos son ejemplos de medidas de:",
    options: [
      { text: "Seguridad Física, porque protegen la infraestructura de accesos no autorizados", correct: false, feedback: "La seguridad física protege hardware e instalaciones con barreras materiales, no con software." },
      { text: "Seguridad de las Personas, porque gestionan el comportamiento de los usuarios internos", correct: false, feedback: "La seguridad de personas abarca concientización y políticas; el IDS y el cifrado son herramientas técnicas." },
      { text: "Seguridad Lógica, porque protegen la información y los sistemas de software", correct: true, feedback: "Correcto. El control de acceso, el cifrado y el IDS son medidas de Seguridad Lógica." },
      { text: "Continuidad del Negocio, porque minimizan el impacto de incidentes en la operación", correct: false, feedback: "La continuidad del negocio es un marco organizacional más amplio; el IDS y el cifrado son controles lógicos." }
    ]
  },
  {
    type: "multi",
    topic: "Áreas de Seguridad",
    question: "¿Cuáles de las siguientes medidas corresponden a la Seguridad Física? (Seleccioná todas las correctas)",
    options: [
      { text: "Sistema de alarma contra incendios en el centro de datos", correct: true, feedback: "Correcto. Los sistemas de alarma son protecciones físicas del hardware y las instalaciones." },
      { text: "Control de acceso biométrico a la sala de servidores", correct: true, feedback: "Correcto. Los controles biométricos de acceso físico son medidas de Seguridad Física." },
      { text: "Cifrado de discos duros con AES-256", correct: false, feedback: "El cifrado es una medida de Seguridad Lógica, no física." },
      { text: "Cámaras de monitoreo continuo en el datacenter", correct: true, feedback: "Correcto. El monitoreo con cámaras es una medida explícita de Seguridad Física." },
      { text: "Política de contraseñas seguras para usuarios", correct: false, feedback: "Las políticas de contraseñas pertenecen a la Seguridad de las Personas y Seguridad Lógica." }
    ]
  },

  // ════════════════════ PLAN DE CONTINGENCIA ════════════════════
  {
    type: "single",
    topic: "Plan de Contingencia",
    question: "¿Cuál es el objetivo principal de un Plan de Contingencia?",

// ─────────────────────────────────────────────
//  Estado
// ─────────────────────────────────────────────
let shuffledQuestions = [];
let answers = [];
let answered = 0;
// multiState[qi] = Set of selected indices
let multiState = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function restart() {
  answered = 0;
  answers = [];
  multiState = {};
  document.getElementById('score-panel').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  buildQuiz();
}

function buildQuiz() {
  shuffledQuestions = shuffle(ALL_QUESTIONS);
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  multiState = {};

  shuffledQuestions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.style.animationDelay = `${qi * 0.03}s`;

    const shuffledOpts = shuffle(q.options);
    const letters = ['A', 'B', 'C', 'D', 'E'];
    const isMulti = q.type === 'multi';

    if (isMulti) multiState[qi] = { selected: new Set(), opts: shuffledOpts, submitted: false };

    const numBadge = isMulti
      ? `<span class="q-num multi-badge">Q${String(qi+1).padStart(2,'0')}</span>`
      : `<span class="q-num">Q${String(qi+1).padStart(2,'0')}</span>`;

    const multiHint = isMulti
      ? `<div style="margin-top:0.4rem"><span class="multi-hint">☑ Selección múltiple — marcá todas las correctas</span></div>`
      : '';

    let optsHTML = '';
    shuffledOpts.forEach((opt, oi) => {
      const cls = isMulti ? 'option-btn multi' : 'option-btn single';
      const onclick = isMulti
        ? `toggleMulti(this, ${qi}, ${oi})`
        : `selectSingle(this, ${qi})`;
      optsHTML += `
        <button class="${cls}" data-correct="${opt.correct}" data-feedback="${encodeURIComponent(opt.feedback)}" data-oi="${oi}" onclick="${onclick}">
          <span class="option-letter">${isMulti ? '□' : letters[oi]}</span>
          <span class="option-text">${opt.text}</span>
        </button>`;
    });

    const submitBtn = isMulti
      ? `<button class="multi-submit" id="submit-${qi}" onclick="submitMulti(${qi})" disabled>Confirmar selección →</button>`
      : '';

    card.innerHTML = `
      <div class="q-header">
        ${numBadge}
        <div>
          <div class="q-topic">${q.topic}</div>
          <div class="q-text">${q.question}</div>
          ${multiHint}
        </div>
      </div>
      <div class="options" id="opts-${qi}">${optsHTML}</div>
      ${submitBtn}
      <div class="feedback" id="fb-${qi}"></div>
    `;
    container.appendChild(card);
  });

  updateProgress();
}

// ─── SINGLE SELECT ───
function selectSingle(btn, qi) {
  if (btn.disabled) return;
  const opts = document.querySelectorAll(`#opts-${qi} .option-btn`);
  const isCorrect = btn.dataset.correct === 'true';
  const feedback = decodeURIComponent(btn.dataset.feedback);

  opts.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  showFeedback(qi, isCorrect ? 'correct' : 'wrong', (isCorrect ? '✓ ' : '✗ ') + feedback);
  recordAnswer(qi, isCorrect ? 'correct' : 'wrong');
}

// ─── MULTI SELECT ───
function toggleMulti(btn, qi, oi) {
  if (multiState[qi].submitted) return;
  const st = multiState[qi];
  if (st.selected.has(oi)) {
    st.selected.delete(oi);
    btn.classList.remove('selected');
    btn.querySelector('.option-letter').textContent = '□';
  } else {
    st.selected.add(oi);
    btn.classList.add('selected');
    btn.querySelector('.option-letter').textContent = '☑';
  }
  const submitBtn = document.getElementById(`submit-${qi}`);
  submitBtn.disabled = st.selected.size === 0;
}

function submitMulti(qi) {
  const st = multiState[qi];
  if (st.submitted) return;
  st.submitted = true;

  const opts = document.querySelectorAll(`#opts-${qi} .option-btn`);
  const submitBtn = document.getElementById(`submit-${qi}`);
  submitBtn.disabled = true;

  const correctIndices = new Set();
  st.opts.forEach((opt, oi) => { if (opt.correct) correctIndices.add(oi); });

  let allCorrect = true;
  let allWrong = true;

  opts.forEach(btn => {
    btn.disabled = true;
    const oi = parseInt(btn.dataset.oi);
    const isCorrect = btn.dataset.correct === 'true';
    const wasSelected = st.selected.has(oi);

    btn.querySelector('.option-letter').textContent = isCorrect ? '✓' : btn.querySelector('.option-letter').textContent;

    if (isCorrect) {
      if (wasSelected) {
        btn.classList.remove('selected');
        btn.classList.add('correct');
      } else {
        // Missed correct — mark it so user sees what they missed
        btn.classList.add('partial-correct');
        allCorrect = false;
      }
    } else if (wasSelected) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
      allCorrect = false;
    }
  });

  // Check if user got exactly right (selected all correct and no wrong)
  const selectedCorrect = [...st.selected].filter(oi => correctIndices.has(oi)).length;
  const selectedWrong = [...st.selected].filter(oi => !correctIndices.has(oi)).length;
  const missedCorrect = correctIndices.size - selectedCorrect;

  let result, feedbackMsg, fbClass;
  if (selectedCorrect === correctIndices.size && selectedWrong === 0) {
    result = 'correct';
    fbClass = 'correct';
    feedbackMsg = `✓ ¡Perfecto! Seleccionaste todas las ${correctIndices.size} opciones correctas.`;
  } else if (selectedCorrect > 0 && selectedWrong === 0 && missedCorrect > 0) {
    result = 'partial';
    fbClass = 'partial';
    feedbackMsg = `⚡ Parcial: ${selectedCorrect}/${correctIndices.size} correctas. Te faltó marcar ${missedCorrect} opción(es) correcta(s) (en naranja).`;
  } else if (selectedCorrect > 0 && selectedWrong > 0) {
    result = 'partial';
    fbClass = 'partial';
    feedbackMsg = `⚡ Parcial: ${selectedCorrect}/${correctIndices.size} correctas, pero marcaste ${selectedWrong} incorrecta(s). Las correctas que faltaron están en naranja.`;
  } else {
    result = 'wrong';
    fbClass = 'wrong';
    feedbackMsg = `✗ Incorrecto. Las respuestas correctas están marcadas en verde (y en naranja las que te faltó seleccionar).`;
  }

  showFeedback(qi, fbClass, feedbackMsg);
  recordAnswer(qi, result);
}

// ─── SHARED HELPERS ───
function showFeedback(qi, type, msg) {
  const fb = document.getElementById(`fb-${qi}`);
  const cls = type === 'correct' ? 'correct-fb' : type === 'partial' ? 'partial-fb' : 'wrong-fb';
  fb.textContent = msg;
  fb.className = `feedback show ${cls}`;
}

function recordAnswer(qi, result) {
  const q = shuffledQuestions[qi];
  answers[qi] = { topic: q.topic, question: q.question, result };
  answered++;
  updateProgress();
  if (answered === shuffledQuestions.length) {
    setTimeout(showResults, 900);
  }
}

function updateProgress() {
  const total = shuffledQuestions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} de ${total} respondidas`;
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const panel = document.getElementById('score-panel');
  panel.classList.add('show');

  const total = answers.length;
  const correct = answers.filter(a => a.result === 'correct').length;
  const partial = answers.filter(a => a.result === 'partial').length;
  // Partial counts as 0.5
  const score = correct + partial * 0.5;
  const pct = Math.round((score / total) * 100);

  const ring = document.getElementById('score-ring');
  ring.style.setProperty('--pct', pct * 3.6 + 'deg');
  ring.textContent = pct + '%';

  if (pct >= 80) ring.style.color = 'var(--correct)';
  else if (pct >= 50) ring.style.color = 'var(--accent3)';
  else ring.style.color = 'var(--wrong)';

  const verdicts = [
    [90, '🔒 Experto en Seguridad'],
    [70, '👍 Buen dominio del tema'],
    [50, '📚 Necesitás repasar'],
    [0,  '⚠️ Recomendamos releer el material']
  ];
  document.getElementById('score-verdict').textContent = verdicts.find(v => pct >= v[0])[1];
  document.getElementById('score-detail').textContent =
    `${correct} perfectas · ${partial} parciales · ${total - correct - partial} incorrectas`;

  const list = document.getElementById('breakdown-list');
  list.innerHTML = answers.map((a, i) => {
    const cls = a.result === 'correct' ? 'ok' : a.result === 'partial' ? 'partial' : 'fail';
    const icon = a.result === 'correct' ? '✓' : a.result === 'partial' ? '~' : '✗';
    return `
      <div class="breakdown-item">
        <span class="bi-topic">${a.topic}</span>
        <span class="bi-q">${a.question}</span>
        <span class="bi-result ${cls}">${icon}</span>
      </div>`;
  }).join('');
}

// Inicio
buildQuiz();
</script>
</body>
</html>
